<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolay</title>
<meta http-equiv="refresh" content="0; url=/it/">
<script>
  (function () {
    var lang = (navigator.language || navigator.userLanguage || "it").toLowerCase();
    var dest = lang.indexOf("it") === 0 ? "/it/" : "/en/";
    window.location.replace(dest);
  })();
</script>
</head>
<body>
  <noscript><meta http-equiv="refresh" content="0; url=/it/"></noscript>
  <p>Reindirizzamento a <a href="/it/">Kolay in italiano</a> / Redirecting to <a href="/en/">Kolay in English</a>…</p>
</body>
</html>
