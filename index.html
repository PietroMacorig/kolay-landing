<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kolay</title>
<meta http-equiv="refresh" content="0; url=/it/">
<script>
  // Solo /it/ esiste per ora. Quando /en/ sarà pronto, cambiare la destinazione
  // per navigator.language che non inizia per "it" da '/it/' a '/en/'.
  (function () {
    var lang = (navigator.language || navigator.userLanguage || "it").toLowerCase();
    var dest = lang.indexOf("it") === 0 ? "/it/" : "/it/";
    window.location.replace(dest);
  })();
</script>
</head>
<body>
  <noscript><meta http-equiv="refresh" content="0; url=/it/"></noscript>
  <p>Reindirizzamento a <a href="/it/">Kolay in italiano</a>…</p>
</body>
</html>
